    <!-- Suppress Figma iframe infrastructure errors (MUST BE FIRST) -->
    <script>
      // Nuclear-level Figma infrastructure error suppression
      (function() {
        // Comprehensive error patterns
        var suppressPatterns = [
          'iframemessageaborterror',
          'message aborted',
          'message port was destroyed',
          'message port',
          'setupmessagechannel',
          'webpack-artifacts',
          'r.cleanup',
          's.cleanup',
          'ei.setupmessagechannel',
          'e.onload',
          'figma.com',
          'figma.site',
          'webpack',
          'min.js.br',
          '.cleanup',
          'cleanup',
          'onload',
          '1061:395596',
          '1061:398647',
          '477:12190',
          '477:5240',
          'at r.',
          'at s.',
          'at e.',
          'at ei.',
          '1535-',
          'figma_app-'
        ];
        
        function shouldSuppress(msg) {
          if (!msg) return false;
          var str = String(msg).toLowerCase();
          return suppressPatterns.some(function(pattern) {
            return str.indexOf(pattern) !== -1;
          });
        }
        
        function isErrorSuppressed(err) {
          if (!err) return false;
          try {
            // Check constructor name
            if (err.constructor && err.constructor.name) {
              if (err.constructor.name.toLowerCase().indexOf('iframe') !== -1) return true;
              if (err.constructor.name.toLowerCase().indexOf('message') !== -1) return true;
            }
            
            // Check all properties
            var parts = [];
            if (err.name) parts.push(err.name);
            if (err.message) parts.push(err.message);
            if (err.stack) parts.push(err.stack);
            if (err.toString) {
              try { parts.push(err.toString()); } catch(e) {}
            }
            
            var combined = parts.join(' ');
            return shouldSuppress(combined);
          } catch(e) {
            return false;
          }
        }
        
        // MAXIMUM SUPPRESSION: Override all console methods
        var noop = function() {};
        var originalMethods = {
          error: console.error,
          warn: console.warn,
          log: console.log,
          info: console.info,
          debug: console.debug
        };
        
        function makeConsoleFilter(methodName) {
          return function() {
            try {
              var args = Array.prototype.slice.call(arguments);
              
              // Check each argument
              for (var i = 0; i < args.length; i++) {
                var arg = args[i];
                
                // Check if it's an error object
                if (arg instanceof Error || (arg && arg.constructor && arg.constructor.name && arg.constructor.name.indexOf('Error') !== -1)) {
                  if (isErrorSuppressed(arg)) return;
                }
                
                // Check string representation
                var str = '';
                try {
                  str = String(arg);
                  if (shouldSuppress(str)) return;
                } catch(e) {}
              }
              
              // Check combined message
              try {
                var combined = args.map(function(a) {
                  try {
                    if (typeof a === 'object' && a !== null) return JSON.stringify(a);
                    return String(a);
                  } catch(e) {
                    return '';
                  }
                }).join(' ');
                
                if (shouldSuppress(combined)) return;
              } catch(e) {}
              
              // If we get here, log it
              originalMethods[methodName].apply(console, args);
            } catch(e) {
              // Fail silently
            }
          };
        }
        
        console.error = makeConsoleFilter('error');
        console.warn = makeConsoleFilter('warn');
        console.log = makeConsoleFilter('log');
        console.info = makeConsoleFilter('info');
        console.debug = makeConsoleFilter('debug');
        
        // Global error handler - MAXIMUM PRIORITY
        window.addEventListener('error', function(event) {
          try {
            if (!event) return;
            
            // Check error object
            if (event.error && isErrorSuppressed(event.error)) {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
              return false;
            }
            
            // Check message and filename
            var msg = '';
            if (event.message) msg += String(event.message) + ' ';
            if (event.filename) msg += String(event.filename) + ' ';
            
            if (shouldSuppress(msg)) {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
              return false;
            }
          } catch(e) {}
        }, true);
        
        // Promise rejection handlers
        window.addEventListener('unhandledrejection', function(event) {
          try {
            if (!event || !event.reason) return;
            
            if (event.reason instanceof Error || (event.reason && event.reason.constructor)) {
              if (isErrorSuppressed(event.reason)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
                return;
              }
            }
            
            var msg = String(event.reason);
            if (shouldSuppress(msg)) {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            }
          } catch(e) {}
        }, true);
        
        window.addEventListener('rejectionhandled', function(event) {
          try {
            if (!event || !event.reason) return;
            if (event.reason instanceof Error && isErrorSuppressed(event.reason)) {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            }
          } catch(e) {}
        }, true);
        
        // Override Error constructor
        var OriginalError = window.Error;
        window.Error = function(message) {
          try {
            if (message && shouldSuppress(String(message))) {
              var err = new OriginalError('');
              err.name = '';
              err.message = '';
              err.stack = '';
              return err;
            }
          } catch(e) {}
          return new OriginalError(message);
        };
        window.Error.prototype = OriginalError.prototype;
        
        // Stub out IframeMessageAbortError entirely
        try {
          window.IframeMessageAbortError = function() {
            return { name: '', message: '', stack: '', constructor: { name: '' } };
          };
        } catch(e) {}
        
        // Nuclear option: Override queueMicrotask to catch async errors
        var origQueueMicrotask = window.queueMicrotask;
        if (origQueueMicrotask) {
          window.queueMicrotask = function(callback) {
            origQueueMicrotask.call(window, function() {
              try {
                callback();
              } catch(err) {
                if (!isErrorSuppressed(err)) {
                  throw err;
                }
              }
            });
          };
        }
        
        // Override setTimeout/setInterval to catch errors
        var origSetTimeout = window.setTimeout;
        var origSetInterval = window.setInterval;
        
        // Direct window.onerror assignment (catches some errors addEventListener misses)
        window.onerror = function(message, source, lineno, colno, error) {
          try {
            if (error && isErrorSuppressed(error)) return true;
            var combined = [message, source, lineno, colno].join(' ');
            if (shouldSuppress(combined)) return true;
          } catch(e) {}
        };

        window.setTimeout = function(fn, delay) {
          var args = Array.prototype.slice.call(arguments, 2);
          return origSetTimeout.call(window, function() {
            try {
              if (typeof fn === 'function') {
                fn.apply(null, args);
              }
            } catch(err) {
              if (!isErrorSuppressed(err)) {
                throw err;
              }
            }
          }, delay);
        };
        
        window.setInterval = function(fn, delay) {
          var args = Array.prototype.slice.call(arguments, 2);
          return origSetInterval.call(window, function() {
            try {
              if (typeof fn === 'function') {
                fn.apply(null, args);
              }
            } catch(err) {
              if (!isErrorSuppressed(err)) {
                throw err;
              }
            }
          }, delay);
        };
      })();
    </script>
